name: Install MongoDB and Node.js
        
        on: [push]
        
        jobs:
          install:
            runs-on: ubuntu-latest
            steps:
              - name: Checkout code
                uses: actions/checkout@v2
              - name: Install dependencies
                run: npm install
              - name: Install MongoDB
                run: npm run install-mongodb
              - name: Install Node.js
                run: npm run install-node